<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Upload Script</title>
</head>
<body>
  <h1>Uploading Products to Firebase...</h1>
  <div id="log"></div>

  <script type="module">
    const logDiv = document.getElementById('log');

    window.onerror = function(msg) {
      logDiv.innerHTML += `<div style="color:red; font-weight:bold;">CRITICAL ERROR: ${msg}</div>`;
    };
    window.addEventListener('unhandledrejection', function(event) {
      logDiv.innerHTML += `<div style="color:red; font-weight:bold;">PROMISE ERROR: ${event.reason}</div>`;
    });

    function log(msg) {
      console.log(msg);
      logDiv.innerHTML += `<div>${msg}</div>`;
    }

    const fileNames = [
      "Pleated maxi with lining ❤️.jpg",
      "Pleated maxi with lining ❤️ (1).jpg",
      "Pleated maxi with lining ❤️ (2).jpg",
      "Pleated maxi with lining ❤️ (3).jpg",
      "Pleated maxi with lining ❤️ (4).jpg",
      "Pleated maxi with lining ❤️ (5).jpg",
      "Pleated maxi with lining ❤️ (7).jpg",
      "Pleated maxi with lining ❤️ (8).jpg",
      "Pleated maxi with lining ❤️ (9).jpg",
      "Pleated maxi with lining ❤️ (10).jpg",
      "Pleated maxi with lining ❤️ (11).jpg",
      "Pleated maxi with lining ❤️ (12).jpg"
    ];

    const REST_URL = "https://firestore.googleapis.com/v1/projects/mukil-fabrics/databases/(default)/documents/mukil_products";

    async function uploadAll() {
      for (let i = 0; i < fileNames.length; i++) {
        // Construct the Firestore REST payload format
        const payload = {
          fields: {
            name: { stringValue: "Pleated Maxi with Lining" },
            price: { integerValue: 1499 },
            originalPrice: { integerValue: 1999 },
            discount: { stringValue: "25%" },
            images: { arrayValue: { values: [ { stringValue: `photos/${fileNames[i]}` } ] } },
            category: { arrayValue: { values: [ { stringValue: "all" }, { stringValue: "maxi" }, { stringValue: "new" } ] } },
            tags: { arrayValue: { values: [ { stringValue: "New" }, { stringValue: "Sale" } ] } },
            sizes: { arrayValue: { values: [
              { mapValue: { fields: { size: { stringValue: "S" }, available: { booleanValue: true }, quantity: { integerValue: 10 } } } },
              { mapValue: { fields: { size: { stringValue: "M" }, available: { booleanValue: true }, quantity: { integerValue: 10 } } } },
              { mapValue: { fields: { size: { stringValue: "L" }, available: { booleanValue: true }, quantity: { integerValue: 10 } } } },
              { mapValue: { fields: { size: { stringValue: "XL" }, available: { booleanValue: true }, quantity: { integerValue: 10 } } } },
              { mapValue: { fields: { size: { stringValue: "XXL" }, available: { booleanValue: true }, quantity: { integerValue: 10 } } } }
            ] } },
            reviews: { integerValue: Math.floor(Math.random() * 50) + 10 }
          }
        };

        try {
          const response = await fetch(REST_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (!response.ok) {
            throw new Error(`HTTP Error ${response.status}: ` + await response.text());
          }
          log(`✅ Added product ${i+1}: ${fileNames[i]}`);
        } catch (err) {
          log(`❌ Failed to add product ${i+1}: ${err.message}`);
        }
      }
      log("🎉 ALL PRODUCTS UPLOADED SUCCESSFULLY!");
    }

    uploadAll();
  </script>
</body>
</html>
